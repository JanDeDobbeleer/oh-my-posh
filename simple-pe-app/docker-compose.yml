version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simple-pe-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-simplepe}
      POSTGRES_USER:     ${POSTGRES_USER:-simplepe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simplepe_secret}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-simplepe} -d ${POSTGRES_DB:-simplepe}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - simple-pe-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simple-pe-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@simple-pe.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - simple-pe-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  simple-pe-network:
    driver: bridge
