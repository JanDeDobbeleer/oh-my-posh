# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
blocks:
  - alignment: left
    segments:
      # Session
      - background: p:black
        foreground: p:white
        invert_powerline: true
        powerline_symbol: ΌΓ╢
        style: powerline
        template: "{{ .UserName }}@{{ .HostName }} "
        type: session

      # Path
      - background: p:orange
        foreground: p:white
        powerline_symbol: ΌΓ░
        properties:
          home_icon: "ΎΑΧ"
          style: folder
        style: powerline
        template: " ΎΒ╗ {{ .Path }} "
        type: path

      # Git
      - background: p:green
        foreground: p:white
        powerline_symbol: ΌΓ░
        properties:
          script: |
            BRANCH=$(git branch --show-current 2>/dev/null)
            [[ -z $BRANCH ]] && exit
            status=$(git status --porcelain | awk '{print $1}')
            [[ $status == *"R"* ]] && bits+='>'
            [[ $status == *"A"* ]] && bits+='+'
            [[ $status == *"??"* ]] && bits+='?'
            [[ $status == *"D"* ]] && bits+='x'
            [[ $status == *"M"* ]] && bits+='!'
            [[ "$(git rev-list --count "@{u}..")" -gt 0 ]] && bits+='*'
            [[ -n $bits ]] && STAT=" Όερ $bits"
            echo -n "Όεξ $BRANCH$STAT"
          shell: bash
        style: powerline
        template: " {{ .Output }} "
        type: command

      # Execution time
      - background: p:darkred
        foreground: p:white
        powerline_symbol: ΌΓ░
        properties:
          always_enabled: true
          style: round
        style: powerline
        template: " ≤░Φθ {{ .FormattedMs }} "
        type: executiontime

      # Exit code
      - background: p:blue
        background_templates:
          - "{{ if gt .Code 0 }}p:red{{ end }}"
        foreground: p:white
        powerline_symbol: ΌΓ░
        properties:
          always_enabled: true
        style: diamond
        template: " {{ if gt .Code 0 }}ΎΑΞ {{ reason .Code }}{{ else }}ΎΑΝ{{ end }} "
        trailing_diamond: ΌΓ┤
        type: status
    type: prompt
  - alignment: right
    segments:
      # Shell
      - background: p:black
        foreground: p:white
        style: plain
        template: <p:black,transparent>ΌΓ╢</>ΎΕι {{ .Name }}<transparent,p:black>ΌΓ▓</>
        type: shell

      # Battery
      - background_templates:
          - '{{if eq "Charging" .State.String }}p:green{{end}}'
          - '{{if eq "Discharging" .State.String}}p:orange{{end}}'
        foreground: p:white
        leading_diamond: ΌΓ▓
        properties:
          charged_icon: ΎΨΔ
          charging_icon: ΎΨΔ
          discharging_icon: "ΎΧ╕ "
        style: diamond
        template: " {{.Templates }} {{ .Percentage}}<transparent> ΌΓ▓</>"
        templates:
          - '{{if eq "Discharging" .State.String}}{{if lt .Percentage 11}}≤░Β║{{else if lt .Percentage 21}}≤░Β╗{{else if lt .Percentage 31}}≤░Β╝{{else if lt .Percentage 41}}≤░Β╜{{else if lt .Percentage 51}}≤░Β╛{{else if lt .Percentage 61}}≤░Β┐{{else if lt .Percentage 71}}≤░ΓΑ{{else if lt .Percentage 81}}≤░ΓΒ{{else if lt .Percentage 91}}≤░ΓΓ{{else}}≤░Β╣{{end}}{{end}}'
          - '{{if eq "Charging"    .State.String}}{{if lt .Percentage 11}}≤░λε{{else if lt .Percentage 21}}≤░ΓΗ{{else if lt .Percentage 31}}≤░ΓΘ{{else if lt .Percentage 41}}≤░ΓΙ{{else if lt .Percentage 51}}≤░λζ{{else if lt .Percentage 61}}≤░ΓΚ{{else if lt .Percentage 71}}≤░λη{{else if lt .Percentage 81}}≤░ΓΛ{{else if lt .Percentage 91}}≤░ΓΜ{{else}}≤░ΓΕ{{end}}{{end}}'
        templates_logic: first_match
        type: battery

      # Weather & time of day
      - background: p:blue
        foreground: p:white
        leading_diamond: ΌΓ▓
        properties:
          script: |
            now="$(date +'%I:%M%P')"
            if [[ -f /tmp/weather.w ]]; then
              update="$(cat /tmp/last_update.w)"
              if [[ -f /tmp/w_lock.w || $(date +'%s') -le $((update + 600)) ]]; then
                echo -n "$now"
                cat /tmp/weather.w
                exit 0
              fi
            elif [[ -f /tmp/w_lock.w ]]; then
              echo "$now"
              exit 0
            fi
            touch /tmp/w_lock.w
            if ! res=$(curl -s wttr.in -Gsm2 --data-urlencode "format=j1"); then
              echo "$now"
              date +'%s' >/tmp/last_update.w
              echo Ύςσ >/tmp/weather.w
              rm /tmp/w_lock.w
              exit 0
            fi
            res=$(jq .current_condition[] -c <<<"$res")
            temp=$(jq -r .temp_C <<<"$res")
            feels_like=$(jq -r .FeelsLikeC <<<"$res")
            [[ $(bc -l <<<"$feels_like!=$temp") -eq 1 ]] && feels_string=" feels $feels_like┬░C"
            WWC_MAP='{"113":"Sunny","116":"PartlyCloudy","119":"Cloudy","122":"VeryCloudy","143":"Fog","176":"LightShowers","179":"LightSleetShowers","182":"LightSleet","185":"LightSleet","200":"ThunderyShowers","227":"LightSnow","230":"HeavySnow","248":"Fog","260":"Fog","263":"LightShowers","266":"LightRain","281":"LightSleet","284":"LightSleet","293":"LightRain","296":"LightRain","299":"HeavyShowers","302":"HeavyRain","305":"HeavyShowers","308":"HeavyRain","311":"LightSleet","314":"LightSleet","317":"LightSleet","320":"LightSnow","323":"LightSnowShowers","326":"LightSnowShowers","329":"HeavySnow","332":"HeavySnow","335":"HeavySnowShowers","338":"HeavySnow","350":"LightSleet","353":"LightShowers","356":"HeavyShowers","359":"HeavyRain","362":"LightSleetShowers","365":"LightSleetShowers","368":"LightSnowShowers","371":"HeavySnowShowers","374":"LightSleetShowers","377":"LightSleet","386":"ThunderyShowers","389":"ThunderyHeavyRain","392":"ThunderySnowShowers","395":"HeavySnowShowers"}';NF_DAY_MAP='{"Unknown":"ΎχΛ","Cloudy":"ΌΝ╜","Fog":"ΌΝΥ","HeavyRain":"ΌΝα","HeavyShowers":"ΌΝΩ","HeavySnow":"ΌΝγ","HeavySnowShowers":"ΌΞη","LightRain":"ΌΝΙ","LightShowers":"ΌΝΚ","LightSleet":"ΌΟς","LightSleetShowers":"ΌΝΗ","LightSnow":"ΌΝΛ","LightSnowShowers":"ΌΞθ","PartlyCloudy":"ΌΝΓ","Sunny":"ΌΝΞ","ThunderyHeavyRain":"ΌΝζ","ThunderyShowers":"ΌΝε","ThunderySnowShowers":"ΌΞξ","VeryCloudy":"ΌΝΤ"}';NF_NIGHT_MAP='{"Unknown":"ΎχΛ","Cloudy":"ΌΝ╜","Fog":"ΌΝΥ","HeavyRain":"ΌΝα","HeavyShowers":"ΌΝΩ","HeavySnow":"ΌΝγ","HeavySnowShowers":"ΌΞη","LightRain":"ΌΝ│","LightShowers":"ΌΝ┤","LightSleet":"ΌΟτ","LightSleetShowers":"ΌΟτ","LightSnow":"ΌΝ╡","LightSnowShowers":"ΌΞι","PartlyCloudy":"ΌΝχ","Sunny":"ΌΝτ","ThunderyHeavyRain":"ΌΝζ","ThunderyShowers":"ΌΝε","ThunderySnowShowers":"ΌΞο","VeryCloudy":"ΌΝΤ"}'
            cur_h="$(date +'%H')" ;wwc="$(jq '.weatherCode' <<<"$res")"
            if [[ $cur_h -gt 18 || $cur_h -lt 6 ]]; then icon=$(jq -r ".$(echo "$WWC_MAP" | jq -r ".$wwc")" <<<"$NF_DAY_MAP")
            else icon=$(jq -r ".$(echo "$WWC_MAP" | jq -r ".$wwc")" <<<"$NF_NIGHT_MAP"); fi
            weather="$icon  $temp┬░C$feels_string"
            echo "$now $weather"
            date +'%s' >/tmp/last_update.w
            echo "$weather" >/tmp/weather.w
            rm /tmp/w_lock.w
        style: diamond
        template: "{{ .Output }}"
        trailing_diamond: ΌΓ┤
        type: command
    type: rprompt
final_space: true
console_title_template: ΎΕι {{ .Shell }} in {{ if ne .Folder "~"}}ΎΒ╗ {{ .Folder }}{{else}}ΎΑΧ{{end}}
palette:
  black: "#33395b"
  blue: "#359ddd"
  darkred: "#7c0a16"
  green: "#277b48"
  orange: "#ff972e"
  red: "#de3142"
  white: "#efeef4"
secondary_prompt:
  background: transparent
  foreground: p:white
  template: "ΎΒκ "
transient_prompt:
  background: transparent
  foreground: p:white
  template: "ΎΒκ "
version: 2
